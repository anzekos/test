    <main class="main">

            <div class="header-title">
                <h2>AI Pravni Asistent</h2>

            </div>

            </button>
        </div>

        <div class="messages" id="chatMessages">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">...</div>
                <p>Začnite pogovor z vprašanjem o<br>slovenski zakonodaji ali vašem dokumentu.</p>
            </div>
        </div>

        <div class="input-area">
            <select class="model-select" id="modelSelect">
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
                <option value="mistral">Mistral</option>
            </select>
            <input type="text" class="query-input" id="queryInput" placeholder="Vpišite vprašanje..."
                onkeydown="if(event.keyCode===13)sendMessage()" />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Pošlji</button>
        </div>
    </main>

    <div class="modal-overlay" id="colleagueModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Izberi sodelavca</h3>
                <button class="modal-close" onclick="closeColleagueModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script>
        // ── STATE & CONSTANTS ───────────────────────────────────────────────────────
        var state = {
            sidebarOpen: true,
            chats: [],
            activeChatId: null,
            colleagues: [],
            activeColleagueId: null,
            modalMode: 'list',
            editingColleagueId: null,
        };

        var DEFAULT_COLLEAGUES = [
            { id: 'default', name: 'Svetovalec', instruction: 'Ti si strokovni pravni svetovalec integriran v M-Files. Pomagaš pri pravnih vprašanjih, analizi dokumentov in iskanju po PIRS bazi.' }
        ];

        var storageFallback = {};
        var safeStorage = {
            getItem: function (key) {
                try {
                    var val = sessionStorage.getItem(key);
                    return val === undefined ? storageFallback[key] : val;
                } catch (e) { return storageFallback[key] || null; }
            },
            setItem: function (key, val) {
                try { sessionStorage.setItem(key, val); } catch (e) { storageFallback[key] = val; }
            }
        };

        var API_BASE = 'http://127.0.0.1:8000/api';

        // ── HELPERS ──────────────────────────────────────────────────────────────────
        function findInArray(arr, predicate) {
            if (!arr) return null;
            for (var i = 0; i < arr.length; i++) {
                if (predicate(arr[i])) return arr[i];
            }
            return null;
        }

        function escHtml(s) {
            if (!s) return "";
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        }

        function apiRequest(method, url, data, callback) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open(method, url, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        var status = 0;
                        try { status = xhr.status; } catch (e) { }
                        if (status >= 200 && status < 300) {
                            try {
                                callback(null, JSON.parse(xhr.responseText));
                            } catch (e) { callback(null, xhr.responseText); }
                        } else {
                            callback(new Error('Status ' + status));
                        }
                    }
                };
                xhr.send(data ? JSON.stringify(data) : null);
            } catch (e) {
                console.error('XHR Error:', e);
                callback(e);
            }
        }

        // ── M-FILES API POMOČNIK ────────────────────────────────────────────────────
        function getVault() {
            if (typeof dashboard !== 'undefined' && dashboard && dashboard.Vault) return dashboard.Vault;
            if (typeof window.dashboard !== 'undefined' && window.dashboard && window.dashboard.Vault) return window.dashboard.Vault;
            if (typeof window.shellUI !== 'undefined' && window.shellUI && window.shellUI.Vault) return window.shellUI.Vault;
            return null;
        }

        // ── DATA SYNC ──────────────────────────────────────────────────────────────
        /**
         * Naloži AI Sodelavce iz M-Files Vaulta (prek VAF Extension Method).
         * Fallback na Python REST API če UIX teče izven M-Files konteksta (razvoj/test).
         */
        function loadColleaguesFromVault(callback) {
            // Poskusi klic na VAF Vault Extension Method
            try {
                var vault = getVault();
                if (vault && vault.ExtensionMethodOperations) {

                    var rawJson = vault.ExtensionMethodOperations
                        .ExecuteVaultExtensionMethod("GetAISodelavci", "");

                    var colleagues = JSON.parse(rawJson);
                    
                    // Če VEM vrne prazen seznam, pokaži mini sporočilo!
                    if (colleagues.length === 0) {
                        alert("DEBUG: VEM klic uspel, ampak vrnil je prazno listo []. To pomeni, da VAF v seštevku ne najde nobenega objekta vrste 'AI Sodelavec'!");
                    }
                    
                    console.log("AI Sodelavci naloženi iz M-Files Vaulta:", colleagues.length);
                    callback(null, colleagues);
                    return; // Uspeh — ne gremo na fallback
                } else {
                    alert("DEBUG: 'vault' ali 'vault.ExtensionMethodOperations' ni na voljo v tem kontekstu.");
                }
            } catch(e) {
                alert("DEBUG NAPAKA pri klicu VEM (GetAISodelavci): " + e.message);
                console.warn("VEM klic neuspešen, fallback na REST API:", e.message);
            }

            // Fallback: Python REST API (za razvoj izven M-Files)
            apiRequest('GET', API_BASE + '/colleagues', null, function(err, cols) {
                if (!err && cols) {
                    console.log("AI Sodelavci naloženi iz REST API (fallback)");
                    callback(null, cols);
                } else {
                    // Zadnji fallback: privzeti sodelavci
                    callback(null, JSON.parse(JSON.stringify(DEFAULT_COLLEAGUES)));
                }
            });
        }

        function loadState() {

            // ── 1. Naloži nastavitve iz M-Files NVS (Samo za BackendUrl) ──
            try {
                var vault = getVault();
                if (vault) {
                    var nvs = vault.NamedValueStorageOperations.GetNamedValues(
                        3, // MFConfigurationValue = 3
                        "AILegalAssistant.Config"
                    );
                    
                    var backendUrl = nvs.Value("BackendUrl");
                    if (backendUrl) {
                        API_BASE = backendUrl + '/api';
                        console.log("Dodaten BackendUrl prebran iz NVS:", API_BASE);
                    }
                }
            } catch (e) {
                console.log("NVS ni dosegljiv:", e.message || e);
            }

            // ── 2. Naloži AI Sodelavce (vedno poskusi dinamično iz Vaulta) ──
            loadColleaguesFromVault(function(err, cols) {
                if (cols && cols.length > 0) {
                    state.colleagues = cols;
                } else {
                    state.colleagues = JSON.parse(JSON.stringify(DEFAULT_COLLEAGUES));
                }
                
                // Povrni aktivnega sodelavca iz seje
                state.activeColleagueId = safeStorage.getItem('ai_active_colleague') || null;
                updateColleagueUI();
            });

            // ── 3. Chat historija (vedno iz API) ──────────────────────────────────────
            apiRequest('GET', API_BASE + '/history', null, function (err, chats) {
                if (!err && chats) {
                    state.chats = chats;
                    state.activeChatId = safeStorage.getItem('ai_active_chat');
                    if (!state.activeChatId && state.chats.length > 0) {
                        state.activeChatId = state.chats[0].id;
                    }
                }
                if (!state.activeChatId) createNewChat();
                renderChatList();
                renderMessages();
                saveActiveState();
            });
        }

        function saveChatToBackend(chat) { apiRequest('POST', API_BASE + '/history', chat, function (err) { }); }
        function saveColleagueToBackend(col) { apiRequest('POST', API_BASE + '/colleagues', col, function (err) { }); }
        function saveActiveState() {
            safeStorage.setItem('ai_active_chat', state.activeChatId);
            safeStorage.setItem('ai_active_colleague', state.activeColleagueId);
        }

        // ── CHAT LOGIC ──────────────────────────────────────────────────────────────
        function createNewChat() {
            var chat = { id: genId(), title: 'Nov pogovor', messages: [], colleagueId: state.activeColleagueId, date: new Date().toISOString() };
            state.chats.unshift(chat);
            state.activeChatId = chat.id;
            renderChatList();
            renderMessages();
            saveActiveState();
        }

        function newChat() { createNewChat(); }
        function loadChat(id) { state.activeChatId = id; renderChatList(); renderMessages(); saveActiveState(); }
        function getActiveChat() { return findInArray(state.chats, function (c) { return c.id === state.activeChatId; }); }

        function deleteChat(id, event) {
            if (event) event.stopPropagation();
            if (!confirm('Izbrišem ta pogovor?')) return;
            state.chats = state.chats.filter(function (c) { return c.id !== id; });
            apiRequest('DELETE', API_BASE + '/history/' + id, null, function (err) { });
            if (state.activeChatId === id) {
                if (state.chats.length > 0) state.activeChatId = state.chats[0].id;
                else { createNewChat(); return; }
            }
            renderChatList();
            renderMessages();
            saveActiveState();
        }

        function sendMessage() {
            var input = document.getElementById('queryInput');
            var btn = document.getElementById('sendBtn');
            var text = input.value.trim();
            if (!text) return;

            var chat = getActiveChat();
            if (!chat) { createNewChat(); chat = getActiveChat(); }

            chat.messages.push({ role: 'user', text: text });
            if (chat.title === 'Nov pogovor') chat.title = text.length > 40 ? text.slice(0, 37) + '...' : text;

            appendMessageDOM('user', text, null, true);
            input.value = '';
            btn.disabled = true;
            btn.textContent = '...';
            renderChatList();
            saveChatToBackend(chat);
            saveActiveState();

            var typingId = 'typing_' + Date.now();
            var typingWrap = document.createElement('div');
            typingWrap.className = 'msg-wrapper bot';
            typingWrap.id = typingId;
            typingWrap.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            document.getElementById('chatMessages').appendChild(typingWrap);
            document.getElementById('chatMessages').scrollTop = 99999;

            var col = findInArray(state.colleagues, function (c) { return c.id === state.activeColleagueId; });
            var instruction = col ? col.instruction : "";

            apiRequest('POST', API_BASE + '/chat', {
                query: text,
                model: document.getElementById('modelSelect').value,
                use_rag: true,
                persona_instruction: instruction
            }, function (err, data) {
                var typing = document.getElementById(typingId);
                if (typing) typing.parentElement.removeChild(typing);
                btn.disabled = false;
                btn.textContent = 'Pošlji';

                if (!err && data) {
                    chat.messages.push({ role: 'bot', text: data.reply, sources: data.sources });
                    appendMessageDOM('bot', data.reply, data.sources, true);
                    saveChatToBackend(chat);
                } else {
                    appendMessageDOM('bot', 'Napaka pri komunikaciji s strežnikom.', null, true);
                }
                renderChatList();
                saveActiveState();
            });
        }

        // ── RENDERING ────────────────────────────────────────────────────────────────
        function renderChatList() {
            var list = document.getElementById('chatList');
            if (state.chats.length === 0) { list.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:#8a8886;">Ni pogovorov</div>'; return; }
            var html = '';
            state.chats.forEach(function (chat) {
                var col = findInArray(state.colleagues, function (c) { return c.id === chat.colleagueId; });
                var isActive = chat.id === state.activeChatId;
                html += '<div class="chat-item' + (isActive ? ' active' : '') + '" onclick="loadChat(\'' + chat.id + '\')">'
                    + '<div class="chat-item-avatar">' + (col ? col.name.charAt(0) : 'S') + '</div>'
                    + '<div class="chat-item-text"><div class="chat-item-title">' + escHtml(chat.title) + '</div>'
                    + '<div class="chat-item-meta">' + (col ? col.name : 'Splošni') + '</div></div>'
                    + '<button class="chat-item-delete" onclick="deleteChat(\'' + chat.id + '\', event)">✕</button></div>';
            });
            list.innerHTML = html;
        }

        function renderMessages() {
            var container = document.getElementById('chatMessages');
            container.innerHTML = '';
            var chat = getActiveChat();
            if (!chat || chat.messages.length === 0) {
                var div = document.createElement('div');
                div.className = 'empty-state';
                div.innerHTML = '<div class="empty-state-icon">⚖️</div><p>Začnite pogovor z vprašanjem.</p>';
                container.appendChild(div);
                return;
            }
            chat.messages.forEach(function (msg) { appendMessageDOM(msg.role, msg.text, msg.sources, false); });
            container.scrollTop = container.scrollHeight;
        }

        function appendMessageDOM(role, text, sources, scroll) {
            var container = document.getElementById('chatMessages');
            var empty = container.querySelector('.empty-state');
            if (empty) empty.parentElement.removeChild(empty);

            var wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper ' + role;
            if (role === 'bot') {
                var label = document.createElement('div');
                label.className = 'msg-label';
                var col = findInArray(state.colleagues, function (c) { return c.id === state.activeColleagueId; });
                label.textContent = col ? col.name : 'Asistent';
                wrapper.appendChild(label);
            }
            var bubble = document.createElement('div');
            bubble.className = 'message ' + role;
            bubble.innerHTML = escHtml(text).replace(/\n/g, '<br>');
            wrapper.appendChild(bubble);
            if (sources && sources.length > 0) {
                var chip = document.createElement('div');
                chip.className = 'sources-chip';
                chip.innerHTML = '<strong>Viri:</strong> ' + sources.join(' · ');
                wrapper.appendChild(chip);
            }
            container.appendChild(wrapper);
            if (scroll) container.scrollTop = container.scrollHeight;
        }

        // ── MODAL LOGIC ─────────────────────────────────────────────────────────────
        function toggleSidebar() {
            state.sidebarOpen = !state.sidebarOpen;
            var el = document.getElementById('sidebar');
            el.className = state.sidebarOpen ? 'sidebar' : 'sidebar collapsed';
        }

        function openColleagueModal() {
            state.modalMode = 'list';
            var el = document.getElementById('colleagueModal');
            if (el.className.indexOf('open') === -1) el.className += ' open';
            renderColleagueModal();
        }

        function closeColleagueModal() { document.getElementById('colleagueModal').className = 'modal-overlay'; }

        function getCurrentUserName() {
            try { var vault = getVault(); return vault ? vault.SessionInfo.AccountName : "MockUser"; } catch (e) { return "MockUser"; }
        }

        function getCurrentUserGroups() {
            try {
                var vault = getVault();
                if (vault) {
                    var groups = vault.CurrentUserGroupMemberships;
                    var names = [];
                    for (var i = 1; i <= groups.Count; i++) { names.push(groups.Item(i).Name); }
                    return names;
                }
            } catch (e) { }
            return ["Legal Department"]; // Mock for testing
        }

        function isColleagueAllowed(col) {
            if (!col.allowed_users && !col.allowed_groups) return true;
            var users = col.allowed_users || [];
            if (users.indexOf('*') !== -1) return true;

            var name = getCurrentUserName();
            if (users.indexOf(name) !== -1) return true;

            var groups = col.allowed_groups || [];
            var myGroups = getCurrentUserGroups();
            for (var i = 0; i < myGroups.length; i++) {
                if (groups.indexOf(myGroups[i]) !== -1) return true;
            }
            return false;
        }

        function renderColleagueModal() {
            var title = document.getElementById('modalTitle');
            var body = document.getElementById('modalBody');
            var footer = document.getElementById('modalFooter');

            title.textContent = 'Izberi sodelavca';
            var html = '<div class="colleague-list">';
            html += '<div class="colleague-card' + (!state.activeColleagueId ? ' selected' : '') + '" onclick="selectColleague(null)">'
                + '<div class="colleague-avatar" style="background:#64748b">A</div>'
                + '<div class="colleague-info"><div class="colleague-name">Brez sodelavca</div>'
                + '<div class="colleague-desc">Privzeti asistent</div></div></div>';

            state.colleagues.forEach(function (col) {
                if (!isColleagueAllowed(col)) return;
                var isSel = state.activeColleagueId === col.id;
                html += '<div class="colleague-card' + (isSel ? ' selected' : '') + '" onclick="selectColleague(\'' + col.id + '\')">'
                    + '<div class="colleague-avatar">' + col.name.charAt(0) + '</div>'
                    + '<div class="colleague-info"><div class="colleague-name">' + escHtml(col.name) + '</div>'
                    + '<div class="colleague-desc">' + (col.instruction ? escHtml(col.instruction.slice(0, 60)) : '') + '...</div></div></div>';
            });
            body.innerHTML = html + '</div>';
            footer.innerHTML = '<button class="btn btn-secondary" onclick="closeColleagueModal()">Zapri</button>';
        }

        function selectColleague(id) { state.activeColleagueId = id; updateColleagueUI(); saveActiveState(); closeColleagueModal(); }

        function updateColleagueUI() {
            var col = findInArray(state.colleagues, function (c) { return c.id === state.activeColleagueId; });
            document.getElementById('activeColleagueName').textContent = col ? col.name : 'Brez sodelavca';
            document.getElementById('colleagueDot').className = 'dot' + (col ? ' active' : '');
        }

        // ── INIT ────────────────────────────────────────────────────────────────────
        function OnNewDashboard(db) {
            window.dashboard = db;
            loadState();
        }

        window.onload = function() {
            // Fallback če nismo v M-Filesu
            setTimeout(function() {
                if (!window.dashboard && !getVault()) {
                    loadState();
                }
            }, 500);
        };
    </script>
</body>

</html>
