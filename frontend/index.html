<!DOCTYPE html>
<html>

<head>
    <title>AI Pravni Asistent</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --sidebar-w: 260px;
            --accent: #0078d4;
            --accent-hover: #0062b0;
            --accent-light: rgba(0, 120, 212, 0.08);
            --border: #e8eaed;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --user-bubble: #0078d4;
            --bot-bubble: #f3f4f6;
            --danger: #dc3545;
            --success: #28a745;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --transition: 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── SIDEBAR ─────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            background: #1e2433;
            color: #cbd5e1;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width var(--transition);
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
        }

        .sidebar-header {
            padding: 18px 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .sidebar-header h3 {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 9px 12px;
            background: rgba(0, 120, 212, 0.2);
            border: 1px solid rgba(0, 120, 212, 0.3);
            border-radius: 8px;
            color: #93c5fd;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background var(--transition);
            white-space: nowrap;
        }

        .new-chat-btn:hover {
            background: rgba(0, 120, 212, 0.35);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-list::-webkit-scrollbar {
            width: 4px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .chat-group-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #475569;
            padding: 10px 8px 4px;
        }

        .chat-item {
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background var(--transition);
            position: relative;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .chat-item.active {
            background: rgba(0, 120, 212, 0.2);
        }

        .chat-item-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        .chat-item-text {
            flex: 1;
            overflow: hidden;
        }

        .chat-item-title {
            font-size: 13px;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .chat-item-meta {
            font-size: 11px;
            color: #64748b;
            margin-top: 1px;
        }

        .chat-item-delete {
            opacity: 0;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 4px;
            flex-shrink: 0;
            transition: opacity var(--transition);
        }

        .chat-item:hover .chat-item-delete {
            opacity: 1;
        }

        /* ── MAIN AREA ────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--surface);
        }

        /* ── HEADER ──────────────────────────────── */
        .header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            flex-shrink: 0;
        }

        .toggle-sidebar-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-muted);
            transition: background var(--transition);
            flex-shrink: 0;
        }

        .toggle-sidebar-btn:hover {
            background: var(--accent-light);
        }

        .header-title {
            flex: 1;
            min-width: 0;
        }

        .header-title h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-title .active-colleague {
            font-size: 11px;
            color: var(--accent);
            font-weight: 500;
            margin-top: 1px;
        }

        .colleague-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .colleague-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .colleague-btn .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            flex-shrink: 0;
        }

        .colleague-btn .dot.active {
            background: var(--success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        /* ── MESSAGES ────────────────────────────── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 6px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
        }

        .msg-wrapper.user {
            align-items: flex-end;
        }

        .msg-wrapper.bot {
            align-items: flex-start;
        }

        .msg-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .message {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 78%;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: var(--bot-bubble);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .sources-chip {
            margin-top: 8px;
            padding: 6px 10px;
            background: #fff8ed;
            border-left: 3px solid #f59e0b;
            border-radius: 0 6px 6px 0;
            font-size: 11px;
            color: #92400e;
            max-width: 78%;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing-bounce 1.4s infinite both;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing-bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── INPUT AREA ──────────────────────────── */
        .input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            flex-shrink: 0;
        }

        .model-select {
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            background: #f8f9fa;
            color: var(--text);
            cursor: pointer;
            outline: none;
            flex-shrink: 0;
        }

        .model-select:focus {
            border-color: var(--accent);
        }

        .query-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: border-color var(--transition);
            min-width: 0;
        }

        .query-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.08);
        }

        .send-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        /* ── MODAL OVERLAY ──────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 540px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            transform: scale(0.95) translateY(10px);
            transition: transform var(--transition);
        }

        .modal-overlay.open .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
        }

        .modal-close:hover {
            background: #f3f4f6;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Colleague list */
        .colleague-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .colleague-card {
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .colleague-card:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .colleague-card.selected {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .colleague-avatar {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0078d4, #00b4d8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .colleague-info {
            flex: 1;
            min-width: 0;
        }

        .colleague-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .colleague-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .colleague-actions {
            display: flex;
            gap: 4px;
        }

        .colleague-action-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all var(--transition);
        }

        .colleague-action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .colleague-action-btn.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .add-colleague-btn {
            width: 100%;
            padding: 10px;
            border: 2px dashed var(--border);
            border-radius: 10px;
            background: none;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
        }

        .add-colleague-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            display: block;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            outline: none;
            transition: border-color var(--transition);
            background: #fafafa;
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.08);
            background: #fff;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.6;
        }

        .form-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .emoji-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .emoji-opt {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #f8f9fa;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .emoji-opt:hover {
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .emoji-opt.selected {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        /* Buttons */
        .btn {
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        /* ── EMPTY STATE ──────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-muted);
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR: Chat history -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Pogovori</h3>
            <button class="new-chat-btn" onclick="newChat()">
                ✏️ Nov pogovor
            </button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="header">
            <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Pogovorni zgodovino">☰</button>
            <div class="header-title">
                <h2>AI Pravni Asistent</h2>
                <div class="active-colleague" id="activeColleagueName">Brez izbranega sodelavca</div>
            </div>
            <div class="status-dot" title="PIRS povezan"></div>
            <button class="colleague-btn" onclick="openColleagueModal()">
                <span class="dot" id="colleagueDot"></span>
                Sodelavec
            </button>
        </div>

        <div class="messages" id="chatMessages">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">⚖️</div>
                <p>Začnite pogovor z vprašanjem o<br>slovenski zakonodaji ali vašem dokumentu.</p>
            </div>
        </div>

        <div class="input-area">
            <select class="model-select" id="modelSelect">
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
                <option value="mistral">Mistral</option>
            </select>
            <input type="text" class="query-input" id="queryInput" placeholder="Vpišite vprašanje..."
                onkeydown="if(event.key==='Enter')sendMessage()" />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Pošlji</button>
        </div>
    </main>

    <!-- COLLEAGUE MODAL -->
    <div class="modal-overlay" id="colleagueModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Izberi sodelavca</h3>
                <button class="modal-close" onclick="closeColleagueModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- filled by JS -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- filled by JS -->
            </div>
        </div>
    </div>

    <script>
        // ── STATE ───────────────────────────────────────────────────────────────────
        var state = {
            sidebarOpen: true,
            chats: [],          // [{id, title, messages, colleagueId, date}]
            activeChatId: null,
            colleagues: [],     // [{id, name, emoji, instruction}]
            activeColleagueId: null,
            modalMode: 'list',  // 'list' | 'add' | 'edit'
            editingColleagueId: null,
        };

        var DEFAULT_COLLEAGUES = [
            {
                id: 'default',
                name: 'Splošni asistent',
                emoji: '⚖️',
                instruction: 'Ti si strokovni pravni asistent integriran v M-Files, ki pomaga odvetnikom pri pripravi dokumentov in iskanju po PIRS bazi.',
            },
            {
                id: 'drafting',
                name: 'Pisec pogodb',
                emoji: '📝',
                instruction: 'Ti si specialist za pripravo pogodb. Osredotočaš se izključno na pripravo, pregled in optimizacijo pogodbenega besedila v skladu s slovensko zakonodajo (OZ, ZDR-1). Vedno predlagaš strukturo pogodbe z vsemi bistvenimi sestavinami.',
            },
            {
                id: 'litigation',
                name: 'Parničar',
                emoji: '🏛️',
                instruction: 'Ti si specialist za parničenje in postopke pred slovenskimi sodišči. Poznaš ZPP do potankosti. Pomagaš pri pripravi tožb, odgovorov na tožbe, pritožb in ostalih procesnih pisanj.',
            },
        ];

        // ── INIT ────────────────────────────────────────────────────────────────────
        (function init() {
            loadState();
            if (state.colleagues.length === 0) {
                state.colleagues = JSON.parse(JSON.stringify(DEFAULT_COLLEAGUES));
            }
            if (state.chats.length === 0) {
                createNewChat();
            } else {
                renderChatList();
                loadChat(state.activeChatId || state.chats[0].id);
            }
            updateColleagueUI();
        })();

        function loadState() {
            try {
                var s = sessionStorage.getItem('ai_asistent_state');
                if (s) {
                    var parsed = JSON.parse(s);
                    state.chats = parsed.chats || [];
                    state.colleagues = parsed.colleagues || [];
                    state.activeChatId = parsed.activeChatId || null;
                    state.activeColleagueId = parsed.activeColleagueId || null;
                }
            } catch (e) { }
        }

        function saveState() {
            try {
                sessionStorage.setItem('ai_asistent_state', JSON.stringify({
                    chats: state.chats,
                    colleagues: state.colleagues,
                    activeChatId: state.activeChatId,
                    activeColleagueId: state.activeColleagueId,
                }));
            } catch (e) { }
        }

        // ── SIDEBAR ──────────────────────────────────────────────────────────────────
        function toggleSidebar() {
            state.sidebarOpen = !state.sidebarOpen;
            document.getElementById('sidebar').classList.toggle('collapsed', !state.sidebarOpen);
        }

        // ── CHAT MANAGEMENT ──────────────────────────────────────────────────────────
        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        }

        function createNewChat() {
            var chat = {
                id: genId(),
                title: 'Nov pogovor',
                messages: [],
                colleagueId: state.activeColleagueId,
                date: new Date().toISOString(),
            };
            state.chats.unshift(chat);
            state.activeChatId = chat.id;
            renderChatList();
            renderMessages();
            saveState();
        }

        function newChat() {
            createNewChat();
        }

        function loadChat(id) {
            state.activeChatId = id;
            renderChatList();
            renderMessages();
            saveState();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            state.chats = state.chats.filter(function (c) { return c.id !== id; });
            if (state.activeChatId === id) {
                if (state.chats.length > 0) {
                    state.activeChatId = state.chats[0].id;
                } else {
                    createNewChat();
                    return;
                }
            }
            renderChatList();
            renderMessages();
            saveState();
        }

        function getActiveChat() {
            return state.chats.find(function (c) { return c.id === state.activeChatId; });
        }

        function updateChatTitle(chat) {
            if (chat.messages.length > 0 && chat.title === 'Nov pogovor') {
                var firstMsg = chat.messages[0].text;
                chat.title = firstMsg.length > 40 ? firstMsg.slice(0, 37) + '…' : firstMsg;
            }
        }

        // ── RENDERING ────────────────────────────────────────────────────────────────
        function renderChatList() {
            var list = document.getElementById('chatList');
            if (state.chats.length === 0) {
                list.innerHTML = '<div style="padding:16px 8px;font-size:12px;color:#475569;text-align:center;">Ni pogovorov</div>';
                return;
            }

            // Group by today / yesterday / earlier
            var now = new Date();
            var groups = { 'Danes': [], 'Včeraj': [], 'Prej': [] };
            state.chats.forEach(function (chat) {
                var d = new Date(chat.date);
                var diff = Math.floor((now - d) / 86400000);
                if (diff === 0) groups['Danes'].push(chat);
                else if (diff === 1) groups['Včeraj'].push(chat);
                else groups['Prej'].push(chat);
            });

            var html = '';
            Object.keys(groups).forEach(function (label) {
                var arr = groups[label];
                if (arr.length === 0) return;
                html += '<div class="chat-group-label">' + label + '</div>';
                arr.forEach(function (chat) {
                    var col = state.colleagues.find(function (c) { return c.id === chat.colleagueId; });
                    var emoji = col ? col.emoji : '💬';
                    var isActive = chat.id === state.activeChatId;
                    html += '<div class="chat-item' + (isActive ? ' active' : '') + '" onclick="loadChat(\'' + chat.id + '\')">'
                        + '<span class="chat-item-icon">' + emoji + '</span>'
                        + '<div class="chat-item-text">'
                        + '<div class="chat-item-title">' + escHtml(chat.title) + '</div>'
                        + '<div class="chat-item-meta">' + (col ? col.name : 'Splošni') + '</div>'
                        + '</div>'
                        + '<button class="chat-item-delete" onclick="deleteChat(\'' + chat.id + '\', event)" title="Izbriši">✕</button>'
                        + '</div>';
                });
            });
            list.innerHTML = html;
        }

        function renderMessages() {
            var container = document.getElementById('chatMessages');
            var chat = getActiveChat();
            var emptyState = document.getElementById('emptyState');

            if (!chat || chat.messages.length === 0) {
                container.innerHTML = '';
                if (emptyState) emptyState.style.display = 'flex';
                container.appendChild(buildEmptyState());
                return;
            }

            container.innerHTML = '';
            chat.messages.forEach(function (msg) {
                appendMessageDOM(msg.role, msg.text, msg.sources, false);
            });
            container.scrollTop = container.scrollHeight;
        }

        function buildEmptyState() {
            var div = document.createElement('div');
            div.className = 'empty-state';
            div.innerHTML = '<div class="empty-state-icon">⚖️</div><p>Začnite pogovor z vprašanjem o<br>slovenski zakonodaji ali vašem dokumentu.</p>';
            return div;
        }

        function appendMessageDOM(role, text, sources, scroll) {
            var container = document.getElementById('chatMessages');

            // Remove empty state
            var es = container.querySelector('.empty-state');
            if (es) es.remove();

            var wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper ' + role;

            if (role === 'bot') {
                var label = document.createElement('div');
                label.className = 'msg-label';
                var col = state.colleagues.find(function (c) { return c.id === state.activeColleagueId; });
                label.textContent = col ? col.name : 'Asistent';
                wrapper.appendChild(label);
            }

            var bubble = document.createElement('div');
            bubble.className = 'message ' + role;
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            wrapper.appendChild(bubble);

            if (sources && sources.length > 0) {
                var chip = document.createElement('div');
                chip.className = 'sources-chip';
                chip.innerHTML = '<strong>Viri:</strong> ' + sources.join(' · ');
                wrapper.appendChild(chip);
            }

            container.appendChild(wrapper);
            if (scroll !== false) container.scrollTop = container.scrollHeight;
        }

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ── SEND MESSAGE ─────────────────────────────────────────────────────────────
        function sendMessage() {
            var input = document.getElementById('queryInput');
            var btn = document.getElementById('sendBtn');
            var text = input.value.trim();
            if (!text) return;

            var chat = getActiveChat();
            if (!chat) { createNewChat(); chat = getActiveChat(); }

            // Save user message
            chat.messages.push({ role: 'user', text: text });
            updateChatTitle(chat);
            appendMessageDOM('user', text, null, true);
            input.value = '';
            btn.disabled = true;
            btn.textContent = '…';
            renderChatList();
            saveState();

            // Typing indicator
            var typingId = 'typing_' + Date.now();
            var typingWrap = document.createElement('div');
            typingWrap.className = 'msg-wrapper bot';
            typingWrap.id = typingId;
            typingWrap.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            document.getElementById('chatMessages').appendChild(typingWrap);
            document.getElementById('chatMessages').scrollTop = 99999;

            // Build system instruction from active colleague
            var col = state.colleagues.find(function (c) { return c.id === state.activeColleagueId; });
            var systemNote = col ? '\n[Navodila za asistenta: ' + col.instruction + ']' : '';

            var model = document.getElementById('modelSelect').value;
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'http://localhost:8000/api/chat', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function () {
                if (xhr.readyState !== 4) return;
                var typing = document.getElementById(typingId);
                if (typing) typing.remove();
                btn.disabled = false;
                btn.textContent = 'Pošlji';

                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        chat.messages.push({ role: 'bot', text: data.reply, sources: data.sources });
                        appendMessageDOM('bot', data.reply, data.sources, true);
                        saveState();
                    } catch (e) {
                        appendMessageDOM('bot', 'Napaka pri branju odgovora.', null, true);
                    }
                } else {
                    appendMessageDOM('bot', 'Napaka pri komunikaciji s strežnikom (HTTP ' + xhr.status + ').', null, true);
                }
                renderChatList();
            };
            xhr.onerror = function () {
                var typing = document.getElementById(typingId);
                if (typing) typing.remove();
                btn.disabled = false;
                btn.textContent = 'Pošlji';
                appendMessageDOM('bot', 'Strežnik ni dosegljiv. Preverite ali teče backend (python main.py).', null, true);
            };
            xhr.send(JSON.stringify({
                query: text + systemNote,
                model: model,
                use_rag: true
            }));
        }

        // ── COLLEAGUE MODAL ──────────────────────────────────────────────────────────
        function openColleagueModal() {
            state.modalMode = 'list';
            renderColleagueModal();
            document.getElementById('colleagueModal').classList.add('open');
        }

        function closeColleagueModal() {
            document.getElementById('colleagueModal').classList.remove('open');
        }

        // Close on overlay click
        document.getElementById('colleagueModal').addEventListener('click', function (e) {
            if (e.target === this) closeColleagueModal();
        });

        function renderColleagueModal() {
            var title = document.getElementById('modalTitle');
            var body = document.getElementById('modalBody');
            var footer = document.getElementById('modalFooter');

            if (state.modalMode === 'list') {
                title.textContent = 'Izberi sodelavca';

                var html = '<div class="colleague-list">';
                // "None" option
                var noneSelected = !state.activeColleagueId;
                html += '<div class="colleague-card' + (noneSelected ? ' selected' : '') + '" onclick="selectColleague(null)">'
                    + '<div class="colleague-avatar" style="background:linear-gradient(135deg,#64748b,#94a3b8)">🤖</div>'
                    + '<div class="colleague-info"><div class="colleague-name">Brez sodelavca</div>'
                    + '<div class="colleague-desc">Privzeti sistemski asistent brez posebnih navodil</div></div>'
                    + '</div>';

                state.colleagues.forEach(function (col) {
                    var isSel = state.activeColleagueId === col.id;
                    var isDefault = DEFAULT_COLLEAGUES.some(function (d) { return d.id === col.id; });
                    html += '<div class="colleague-card' + (isSel ? ' selected' : '') + '" onclick="selectColleague(\'' + col.id + '\')">'
                        + '<div class="colleague-avatar">' + col.emoji + '</div>'
                        + '<div class="colleague-info"><div class="colleague-name">' + escHtml(col.name) + '</div>'
                        + '<div class="colleague-desc">' + escHtml(col.instruction.slice(0, 80)) + (col.instruction.length > 80 ? '…' : '') + '</div></div>'
                        + '<div class="colleague-actions">'
                        + '<button class="colleague-action-btn" onclick="editColleague(\'' + col.id + '\', event)">✏️ Uredi</button>'
                        + (!isDefault ? '<button class="colleague-action-btn danger" onclick="deleteColleague(\'' + col.id + '\', event)">🗑️</button>' : '')
                        + '</div>'
                        + '</div>';
                });
                html += '</div>';
                html += '<button class="add-colleague-btn" onclick="showAddForm()">+ Dodaj novega sodelavca</button>';

                body.innerHTML = html;
                footer.innerHTML = '<button class="btn btn-secondary" onclick="closeColleagueModal()">Zapri</button>';

            } else if (state.modalMode === 'add' || state.modalMode === 'edit') {
                var isEdit = state.modalMode === 'edit';
                var col = isEdit ? state.colleagues.find(function (c) { return c.id === state.editingColleagueId; }) : null;
                title.textContent = isEdit ? 'Uredi sodelavca' : 'Dodaj sodelavca';

                var emojis = ['⚖️', '📝', '🏛️', '🔍', '📋', '💼', '🧑‍💼', '👩‍⚖️', '📊', '🗂️', '🤝', '📌', '💡', '🔒', '📑'];
                var selectedEmoji = col ? col.emoji : '⚖️';

                var emojiHtml = emojis.map(function (e) {
                    return '<button class="emoji-opt' + (e === selectedEmoji ? ' selected' : '') + '" onclick="selectEmoji(\'' + e + '\')" type="button">' + e + '</button>';
                }).join('');

                body.innerHTML = '<div class="form-group">'
                    + '<label class="form-label">Ikona</label>'
                    + '<div class="emoji-picker" id="emojiPicker">' + emojiHtml + '</div>'
                    + '<input type="hidden" id="colEmoji" value="' + (col ? col.emoji : '⚖️') + '">'
                    + '</div>'
                    + '<div class="form-group">'
                    + '<label class="form-label">Ime sodelavca</label>'
                    + '<input type="text" class="form-input" id="colName" placeholder="npr. Ana, Dr. Novak, Parničar …" value="' + (col ? escHtml(col.name) : '') + '">'
                    + '</div>'
                    + '<div class="form-group">'
                    + '<label class="form-label">Navodila za obnašanje</label>'
                    + '<textarea class="form-textarea" id="colInstruction" placeholder="Ti si pravnik v pisarni XYZ. Delaš za stranke s področja gospodarskega prava. Vedno odgovarjaš v slovenščini in cituiraš relevantne zakonske člene…">' + (col ? escHtml(col.instruction) : '') + '</textarea>'
                    + '<div class="form-hint">Opiši vlogo, naloge, ton in posebna navodila za tega asistenta.</div>'
                    + '</div>';

                footer.innerHTML = '<button class="btn btn-secondary" onclick="showColleagueList()">← Nazaj</button>'
                    + '<button class="btn btn-primary" onclick="saveColleague()">💾 Shrani</button>';
            }
        }

        function selectEmoji(e) {
            document.getElementById('colEmoji').value = e;
            document.querySelectorAll('.emoji-opt').forEach(function (btn) {
                btn.classList.toggle('selected', btn.textContent === e);
            });
        }

        function showColleagueList() {
            state.modalMode = 'list';
            state.editingColleagueId = null;
            renderColleagueModal();
        }

        function showAddForm() {
            state.modalMode = 'add';
            state.editingColleagueId = null;
            renderColleagueModal();
        }

        function editColleague(id, event) {
            event.stopPropagation();
            state.modalMode = 'edit';
            state.editingColleagueId = id;
            renderColleagueModal();
        }

        function deleteColleague(id, event) {
            event.stopPropagation();
            if (!confirm('Ste prepričani, da želite izbrisati tega sodelavca?')) return;
            state.colleagues = state.colleagues.filter(function (c) { return c.id !== id; });
            if (state.activeColleagueId === id) {
                state.activeColleagueId = null;
                updateColleagueUI();
            }
            saveState();
            renderColleagueModal();
        }

        function saveColleague() {
            var name = document.getElementById('colName').value.trim();
            var instruction = document.getElementById('colInstruction').value.trim();
            var emoji = document.getElementById('colEmoji').value;

            if (!name) { alert('Vnesite ime sodelavca.'); return; }
            if (!instruction) { alert('Vnesite navodila za sodelavca.'); return; }

            if (state.modalMode === 'edit') {
                var col = state.colleagues.find(function (c) { return c.id === state.editingColleagueId; });
                if (col) { col.name = name; col.instruction = instruction; col.emoji = emoji; }
            } else {
                state.colleagues.push({ id: genId(), name: name, emoji: emoji, instruction: instruction });
            }

            saveState();
            state.modalMode = 'list';
            state.editingColleagueId = null;
            renderColleagueModal();
        }

        function selectColleague(id) {
            state.activeColleagueId = id;
            updateColleagueUI();
            saveState();
            closeColleagueModal();
        }

        function updateColleagueUI() {
            var col = state.activeColleagueId
                ? state.colleagues.find(function (c) { return c.id === state.activeColleagueId; })
                : null;
            var nameEl = document.getElementById('activeColleagueName');
            var dotEl = document.getElementById('colleagueDot');
            if (col) {
                nameEl.textContent = col.emoji + ' ' + col.name;
                dotEl.className = 'dot active';
            } else {
                nameEl.textContent = 'Brez izbranega sodelavca';
                dotEl.className = 'dot';
            }
        }
    </script>
</body>

</html>
