<!DOCTYPE html>
<html>

<head>
    <title>AI Legal Assistant</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f2f5;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 92vh;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- VHODNO OBMOČJE --- */
        .input-area {
            display: flex;
            align-items: center;
            padding: 25px;
            background: #ffffff;
            border-top: 1px solid #f0f0f0;
            gap: 15px;
        }

        /* Modern Select */
        select {
            padding: 12px 15px;
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            font-size: 14px;
            background: #f8f9fa;
            color: #444;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        select:hover {
            border-color: #0078d4;
        }

        /* Modern Input */
        input[type="text"] {
            flex-grow: 1;
            padding: 14px 20px;
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
            background: #fdfdfd;
        }

        input[type="text"]:focus {
            border-color: #0078d4;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.1);
        }

        /* --- GLAVNI GUMB Z EFEKTI --- */
        .btn-send {
            padding: 14px 32px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Hover efekt: Sij in rahel dvig */
        .btn-send:hover:not(:disabled) {
            background: #0086ee;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 120, 212, 0.4);
        }

        /* Active efekt: Pritisk in zmanjšanje sija */
        .btn-send:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(0, 120, 212, 0.4);
            background: #005a9e;
        }

        /* Onemogočen gumb */
        .btn-send:disabled {
            background: #e1e4e8;
            color: #999;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* --- OSTALI ELEMENTI --- */
        .header {
            padding: 20px 30px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-size: 19px;
            color: #1a1a1a;
            margin: 0;
            font-weight: 700;
        }

        .messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            background: #fff;
        }

        .message {
            padding: 16px 22px;
            border-radius: 18px;
            max-width: 75%;
            font-size: 14.5px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .message.user {
            background: #0078d4;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.15);
        }

        .message.bot {
            background: #f8f9fa;
            color: #201f1e;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid #eee;
        }

        /* Smooth scrollbar */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #e1e4e8;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="header">
            <h2>AI Pravni Asistent</h2>
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:10px; height:10px; background:#28a745; border-radius:50%;"></div>
                <span style="font-size:12px; font-weight:600; color:#666;">PIRS POVEZAN</span>
            </div>
        </div>

        <div class="messages" id="chatMessages">
            <div class="message bot">
                Pozdravljeni! Sem vaš pametni asistent. Kako vam lahko danes pomagam pri pripravi dokumentacije ali
                iskanju po PIRS bazi?
            </div>
        </div>

        <div class="input-area">
            <select id="modelSelect">
                <option value="claude">Claude 3</option>
                <option value="gemini">Gemini Pro</option>
                <option value="mistral">Mistral AI</option>
            </select>
            <input type="text" id="queryInput" placeholder="Vpišite vprašanje..." onkeypress="handleKeyPress(event)" />
            <button onclick="sendMessage()" id="sendBtn" class="btn-send">Pošlji</button>
        </div>
    </div>

    <script>
        function handleKeyPress(e) { if ((e.which || e.keyCode) === 13) sendMessage(); }

        function sendMessage() {
            var input = document.getElementById("queryInput");
            var messages = document.getElementById("chatMessages");
            var btn = document.getElementById("sendBtn");

            if (!input.value.trim()) return;

            // Render User message
            var userMsg = document.createElement("div");
            userMsg.className = "message user";
            userMsg.innerHTML = input.value;
            messages.appendChild(userMsg);

            var currentQuery = input.value;
            input.value = "";
            messages.scrollTop = messages.scrollHeight;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = "Iščem...";

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "http://localhost:8000/api/chat", true);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    btn.disabled = false;
                    btn.innerHTML = "Pošlji";

                    if (xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        var botMsg = document.createElement("div");
                        botMsg.className = "message bot";
                        botMsg.innerHTML = "<strong>" + data.model_used.toUpperCase() + ":</strong><br><br>" + data.reply.replace(/\n/g, "<br>");
                        messages.appendChild(botMsg);
                    }
                    messages.scrollTop = messages.scrollHeight;
                }
            };
            xhr.send(JSON.stringify({ query: currentQuery, model: document.getElementById("modelSelect").value }));
        }
    </script>
</body>

</html>
