<!DOCTYPE html>
<html>

<head>
    <title>AI Legal Assistant</title>
    <meta charset="utf-8" />

    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f3f4f6;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 92vh;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
        }

        /* MESSAGE BASE */
        .message {
            padding: 14px 18px;
            border-radius: 16px;
            max-width: 75%;
            margin-bottom: 12px;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            background: #6366f1;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #f3f4f6;
        }

        /* INPUT */
        .input-wrapper {
            padding: 15px;
        }

        .input-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 18px;
            background: #fff;
            border: 1px solid #e5e7eb;
            transition: 0.25s;
        }

        .input-box:focus-within {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 14px;
            max-height: 120px;
            background: transparent;
        }

        .icon-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
        }

        .send-btn {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
        }

        /* TYPING DOTS */
        .typing {
            display: flex;
            gap: 5px;
            padding: 10px 14px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <div class="header">
            <strong>AI Pravni Asistent</strong>
            <span style="font-size:12px;color:#888;">ONLINE</span>
        </div>

        <div class="messages" id="chatMessages">
            <div class="message bot">
                Pozdravljeni! Kako vam lahko pomagam?
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <button class="icon-btn">📎</button>
                <textarea id="queryInput" placeholder="Ask anything..." rows="1"></textarea>
                <button onclick="sendMessage()" id="sendBtn" class="send-btn">➤</button>
            </div>
        </div>

    </div>

    <script>

        const textarea = document.getElementById("queryInput");

        textarea.addEventListener("input", () => {
            textarea.style.height = "auto";
            textarea.style.height = textarea.scrollHeight + "px";
        });

        textarea.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {

            const input = document.getElementById("queryInput");
            const messages = document.getElementById("chatMessages");
            const btn = document.getElementById("sendBtn");

            const text = input.value.trim();
            if (!text) return;

            // USER MESSAGE
            const userMsg = document.createElement("div");
            userMsg.className = "message user";
            userMsg.innerText = text;
            messages.appendChild(userMsg);

            input.value = "";
            input.style.height = "auto";

            messages.scrollTop = messages.scrollHeight;

            // TYPING DOTS
            const typing = document.createElement("div");
            typing.className = "message bot typing";
            typing.id = "typingIndicator";
            typing.innerHTML = `
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    `;
            messages.appendChild(typing);
            messages.scrollTop = messages.scrollHeight;

            btn.disabled = true;

            // API CALL
            const xhr = new XMLHttpRequest();
            xhr.open("POST", "http://localhost:8000/api/chat", true);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {

                    btn.disabled = false;

                    // REMOVE TYPING
                    const typingEl = document.getElementById("typingIndicator");
                    if (typingEl) typingEl.remove();

                    if (xhr.status === 200) {
                        const data = JSON.parse(xhr.responseText);

                        const botMsg = document.createElement("div");
                        botMsg.className = "message bot";
                        botMsg.innerHTML = data.reply.replace(/\n/g, "<br>");
                        messages.appendChild(botMsg);
                    }

                    messages.scrollTop = messages.scrollHeight;
                }
            };

            xhr.send(JSON.stringify({ query: text }));
        }

    </script>

</body>

</html>
